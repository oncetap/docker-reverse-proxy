services:
  museum:
    image: ghcr.io/ente-io/server
    container_name: ente-museum
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./museum.yaml:/museum.yaml:ro
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/ping"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    networks:
      - proxy
      - ente-net
    labels:
      - "traefik.enable=true"
      # HTTP
      - "traefik.http.routers.ente-museum.entrypoints=http"
      - "traefik.http.routers.ente-museum.rule=Host(`photos-api.domain.tld`)"
      - "traefik.http.middlewares.ente-museum-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.ente-museum.middlewares=ente-museum-https-redirect"
      # HTTPS
      - "traefik.http.routers.ente-museum-secure.entrypoints=https"
      - "traefik.http.routers.ente-museum-secure.rule=Host(`photos-api.domain.tld`)"
      - "traefik.http.routers.ente-museum-secure.tls=true"
      - "traefik.http.routers.ente-museum-secure.service=ente-museum-api"
      - "traefik.http.services.ente-museum-api.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"

  web:
    image: ghcr.io/ente-io/web
    container_name: ente-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - ENTE_API_ORIGIN=https://photos-api.domain.tld
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Photos
      - "traefik.http.routers.ente-photos.entrypoints=http"
      - "traefik.http.routers.ente-photos.rule=Host(`photos.domain.tld`)"
      - "traefik.http.middlewares.ente-photos-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.ente-photos.middlewares=ente-photos-https-redirect"
      - "traefik.http.routers.ente-photos-secure.entrypoints=https"
      - "traefik.http.routers.ente-photos-secure.rule=Host(`photos.domain.tld`)"
      - "traefik.http.routers.ente-photos-secure.tls=true"
      - "traefik.http.routers.ente-photos-secure.service=ente-web-photos"
      - "traefik.http.services.ente-web-photos.loadbalancer.server.port=3000"
      # Accounts, only for passkey 2FA
