  postgres:
    image: postgres:18-alpine
    container_name: ente-postgres
    restart: always
    shm_size: 128mb
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_USER=ente
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=ente_db
    healthcheck:
      test: pg_isready -q -d ente_db -U ente
      start_period: 40s
      start_interval: 1s
    volumes:
      - ./postgres:/var/lib/postgresql
    networks:
      - ente-net

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: ente-garage
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - RUST_LOG=info
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - ./garage-meta:/var/lib/garage/meta
      - ./garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - proxy
      - ente-net
    labels:
      - "traefik.enable=true"
      # HTTP
      - "traefik.http.routers.ente-s3.entrypoints=http"
      - "traefik.http.routers.ente-s3.rule=Host(`photos-s3.domain.tld`)"
      - "traefik.http.middlewares.ente-s3-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.ente-s3.middlewares=ente-s3-https-redirect"
      # HTTPS
      - "traefik.http.routers.ente-s3-secure.entrypoints=https"
      - "traefik.http.routers.ente-s3-secure.rule=Host(`photos-s3.domain.tld`)"
      - "traefik.http.routers.ente-s3-secure.tls=true"
      - "traefik.http.routers.ente-s3-secure.service=ente-s3-api"
      - "traefik.http.services.ente-s3-api.loadbalancer.server.port=3900"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
  ente-net:
    external: true
